worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream ollama {
        server host.docker.internal:11434;  # Ollama running on the HOST (GPU-accelerated)
    }

    server {
        listen 443 ssl;
        server_name model.example.com;

        ssl_certificate /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;
        ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://ollama;
            proxy_http_version 1.1;
            # Host Ollama rejects non-localhost Host headers (DNS-rebinding guard,
            # HTTP 403). Present localhost so the host daemon accepts the request.
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Origin '';
            proxy_set_header Referer '';
        }
    }
}