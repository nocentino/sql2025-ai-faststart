# SQL Server 2025 AI FastStart
# -----------------------------------------------------------------------------
# One `docker compose up` gives you the whole AI-on-the-database stack:
#
#   Ollama (local embeddings)  ──TLS──►  NGINX  ◄──HTTPS──  SQL Server 2025
#                                                                │
#                                          AdventureWorksLT + native VECTOR data
#                                                                │
#   AI agent (Claude / Copilot) ──MCP──►  Data API builder ──────┘
#
# Services come up in dependency order, the database is restored and vectorized
# automatically, and Data API builder exposes it to your AI agent over MCP.
# -----------------------------------------------------------------------------

services:

  # 1. Generates a self-signed TLS cert for NGINX. SQL Server 2025 will only
  #    call an embeddings endpoint over HTTPS, so we put TLS in front of Ollama.
  config:
    build:
      context: .
      dockerfile: dockerfile.ssl
    volumes:
      - "./certs/:/certs/"
    command: sh /certs/generate_ssl.sh

  # 2. Ollama serves the embedding model locally — no cloud, no API keys.
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama ls > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - OLLAMA_HOST=ollama
      - OLLAMA_METAL=1
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - app_network

  # 3. Pulls the embedding model once Ollama is healthy, then exits.
  #    nomic-embed-text produces 768-dimension vectors -> VECTOR(768) in SQL.
  model-puller:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=ollama
    networks:
      - app_network
    entrypoint: sh -c "sleep 5 && ollama pull nomic-embed-text"

  # 4. NGINX terminates TLS on :443 and reverse-proxies to Ollama. This is the
  #    HTTPS endpoint SQL Server's EXTERNAL MODEL points at.
  model-web:
    image: nginx:latest
    restart: unless-stopped
    depends_on:
      config:
        condition: service_completed_successfully   # certs exist before we mount them
      ollama:
        condition: service_started
    ports:
      - "443:443"
    volumes:
      - "./config/nginx.conf:/etc/nginx/nginx.conf:ro"
      - "./certs:/etc/nginx/certs:ro"
    networks:
      - app_network

  # 5. SQL Server 2025. Vector data type, AI_GENERATE_EMBEDDINGS, VECTOR_SEARCH,
  #    and DiskANN vector indexes all live here.
  #
  #    NOTE for Apple Silicon: the image is amd64 and runs under Rosetta. You
  #    need SQL Server 2025 CU1 or later (the `2025-latest` tag below includes
  #    it) — CU1 fixed the AVX issue that prevented vector ops under emulation.
  #    See: https://www.nocentino.com/posts/2026-02-02-sql-server-2025-cu1-fixes-avx-issue/
  sql1:
    platform: linux/amd64
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: sql1
    restart: unless-stopped
    depends_on:
      config:
        condition: service_completed_successfully   # need ./certs/nginx.crt to exist
      model-web:
        condition: service_started
    hostname: sql1
    networks:
      - app_network
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql
      # Mount the NGINX cert into SQL Server's trusted CA store so the TLS call
      # to Ollama is trusted.
      - "./certs/nginx.crt:/var/opt/mssql/security/ca-certificates/public.crt:ro"
      - "./backups:/var/opt/mssql/backups/"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=S0methingS@Str0ng!   # demo only — throwaway password
      - MSSQL_PID=Developer

  # 6. One-shot init: waits for SQL Server, then runs the SAME demo script you'll
  #    walk through live (demos/vector-demos.sql). It restores AdventureWorksLT,
  #    wires up the EXTERNAL MODEL, generates embeddings, builds the vector index,
  #    and creates the semantic-search proc + least-privilege login that Data API
  #    builder uses. The script is idempotent, so re-running it live is safe.
  #    Exits when finished.
  sql-init:
    platform: linux/amd64
    image: mcr.microsoft.com/mssql-tools
    container_name: sql-init
    restart: "no"
    depends_on:
      model-puller:
        condition: service_completed_successfully
      sql1:
        condition: service_started
    networks:
      - app_network
    volumes:
      - ./demos:/demos:ro
    entrypoint: /bin/bash -c "
      until /opt/mssql-tools/bin/sqlcmd -S sql1 -U sa -P S0methingS@Str0ng! -Q 'SELECT 1' > /dev/null 2>&1; do
        echo 'Waiting for SQL Server to be ready...';
        sleep 2;
      done;
      echo 'SQL Server is up — running demos/vector-demos.sql (restore + embeddings + DAB proc). First run takes a few minutes while embeddings generate...';
      /opt/mssql-tools/bin/sqlcmd -S sql1 -U sa -P S0methingS@Str0ng! -i /demos/vector-demos.sql"

  # 7. Data API builder — the new part. Points at AdventureWorksLT and exposes
  #    it over REST, GraphQL, AND MCP (Model Context Protocol) with zero code.
  #    Your AI agent connects to http://localhost:5001/mcp.
  dab:
    image: mcr.microsoft.com/azure-databases/data-api-builder:2.0.1-rc
    platform: linux/amd64
    container_name: dab
    hostname: dab
    depends_on:
      sql-init:
        condition: service_completed_successfully
    environment:
      # dab_app is a least-privilege login created by setup.sql: SELECT on a few
      # catalog objects + EXECUTE on the semantic-search proc. Nothing else.
      - MSSQL_CONNECTION_STRING=Server=sql1,1433;Database=AdventureWorksLT;User ID=dab_app;Password=DabP@ss123!;Encrypt=false;TrustServerCertificate=true;
    ports:
      - "5001:5000"
    volumes:
      - ./dab-config.json:/App/dab-config.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:

volumes:
  ollama-models:
  sql-data:
