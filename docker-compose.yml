# SQL Server 2025 AI FastStart
# -----------------------------------------------------------------------------
# One `docker compose up` gives you the whole AI-on-the-database stack:
#
#   Host Ollama (GPU)  ◄──HTTP──  NGINX(TLS)  ◄──HTTPS──  SQL Server 2025
#                                                              │
#                                    StackOverflow + native VECTOR data
#                                                              │
#   AI agent (Claude / Copilot) ──MCP──►  Data API builder ────┘  (semantic search)
#                                ──MCP──►  SQL DBA MCP server ──┘  (read-only DBA tools)
#
# Ollama runs on the HOST (GPU-accelerated, already has the model). NGINX adds the
# TLS that SQL Server 2025's EXTERNAL MODEL requires and reverse-proxies to it.
# The database is restored and vectorized automatically, then two MCP servers
# expose it to your AI agent: Data API builder (semantic search) and the SQL DBA
# server (fleet monitoring).
# -----------------------------------------------------------------------------

services:

  # 1. Generates a self-signed TLS cert for NGINX. SQL Server 2025 will only call
  #    an embeddings endpoint over HTTPS, so we put TLS in front of host Ollama.
  config:
    build:
      context: .
      dockerfile: dockerfile.ssl
    volumes:
      - "./certs/:/certs/"
    command: sh /certs/generate_ssl.sh

  # 2. NGINX terminates TLS on :443 and reverse-proxies to OLLAMA RUNNING ON THE
  #    HOST (host.docker.internal:11434) — GPU-accelerated, no container, no model
  #    download. This is the HTTPS endpoint SQL Server's EXTERNAL MODEL points at.
  model-web:
    image: nginx:latest
    restart: unless-stopped
    depends_on:
      config:
        condition: service_completed_successfully   # certs exist before we mount them
    extra_hosts:
      - "host.docker.internal:host-gateway"          # reach the host's Ollama
    ports:
      - "443:443"
    volumes:
      - "./config/nginx.conf:/etc/nginx/nginx.conf:ro"
      - "./certs:/etc/nginx/certs:ro"
    networks:
      - app_network

  # 3. SQL Server 2025. Vector data type, AI_GENERATE_EMBEDDINGS, VECTOR_SEARCH,
  #    and DiskANN vector indexes all live here.
  sql1:
    platform: linux/amd64
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: sql1
    restart: unless-stopped
    depends_on:
      config:
        condition: service_completed_successfully   # need ./certs/nginx.crt to exist
      model-web:
        condition: service_started
    hostname: sql1
    networks:
      - app_network
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql
      # Mount the NGINX cert into SQL Server's trusted CA store so the TLS call
      # to the embedding endpoint is trusted.
      - "./certs/nginx.crt:/var/opt/mssql/security/ca-certificates/public.crt:ro"
      - "./backups:/var/opt/mssql/backups/"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=S0methingS@Str0ng!   # demo only — throwaway password
      - MSSQL_PID=Developer
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"S0methingS@Str0ng!\" -C -l 5 -t 5 -h -1 -Q \"SET NOCOUNT ON; SELECT 'PROBEOK'\" 2>/dev/null | grep -q '^PROBEOK$$'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # 4. One-shot init: waits for SQL Server to be healthy, then runs the SAME demo
  #    script you walk through live (demos/vector-demos.sql). It restores
  #    StackOverflow, wires up the EXTERNAL MODEL, embeds a curated set of
  #    questions, builds the DiskANN vector index, and creates the semantic-search
  #    proc + the least-privilege logins (dab_app for DAB, dba_monitor for the DBA
  #    MCP server). The script is idempotent, so re-running it live is safe. Exits
  #    when finished.
  sql-init:
    platform: linux/amd64
    image: mcr.microsoft.com/mssql-tools
    container_name: sql-init
    restart: "no"
    depends_on:
      sql1:
        condition: service_healthy          # gated by sql1's healthcheck
      model-web:
        condition: service_started          # nginx must be up for the embedding calls
    networks:
      - app_network
    volumes:
      - ./demos:/demos:ro
    entrypoint: /bin/bash -c "
      echo 'SQL Server is healthy — running demos/vector-demos.sql (restore + embeddings + DAB proc). First run takes a few minutes while embeddings generate...';
      /opt/mssql-tools/bin/sqlcmd -S sql1 -U sa -P S0methingS@Str0ng! -i /demos/vector-demos.sql"

  # 5. Data API builder — points at StackOverflow and exposes it over REST,
  #    GraphQL, AND MCP (Model Context Protocol) with zero code. The semantic-search
  #    proc is registered as a named MCP tool. Your AI agent connects to
  #    http://localhost:5001/mcp.
  dab:
    image: mcr.microsoft.com/azure-databases/data-api-builder:2.0.1-rc
    platform: linux/amd64
    container_name: dab
    hostname: dab
    depends_on:
      sql-init:
        condition: service_completed_successfully
    environment:
      # dab_app is a least-privilege login created by vector-demos.sql: SELECT on a
      # few catalog objects + EXECUTE on the semantic-search proc. Nothing else.
      - MSSQL_CONNECTION_STRING=Server=sql1,1433;Database=StackOverflow;User ID=dab_app;Password=DabP@ss123!;Encrypt=false;TrustServerCertificate=true;
    ports:
      - "5001:5000"
    volumes:
      - ./dab-config.json:/App/dab-config.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - app_network
    restart: unless-stopped

  # 6. SQL DBA MCP server (bonus) — a read-only fleet-monitoring MCP server with
  #    ~30 tools (wait stats, blocking chains, top queries, missing indexes,
  #    backup/AG health, deadlocks, …). It connects as dba_monitor (VIEW SERVER
  #    STATE only) and exposes those DBA tasks to your agent over MCP at
  #    http://localhost:3001/mcp. This shows agents doing DBA work, not just
  #    semantic search.
  sql-dba-mcp:
    build: ./sql-dba-mcp
    container_name: sql-dba-mcp
    depends_on:
      sql-init:
        condition: service_completed_successfully
    environment:
      # One named instance pointing at sql1. list_instances surfaces this to the
      # agent; the format is a JSON array so you can add more servers later.
      - INSTANCES=[{"name":"sql1","host":"sql1","port":1433,"user":"dba_monitor","password":"MonitorP@ss123!"}]
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:

volumes:
  sql-data:
